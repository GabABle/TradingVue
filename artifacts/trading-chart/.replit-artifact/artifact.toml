kind = "web"
previewPath = "/"
title = "Trading Chart"
version = "1.0.0"
id = "artifacts/trading-chart"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21852

[services.development]
run = "pnpm --filter @workspace/trading-chart run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/trading-chart", "run", "build" ]
publicDir = "artifacts/trading-chart/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21852"
BASE_PATH = "/"
